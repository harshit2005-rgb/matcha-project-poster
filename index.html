<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Matcha Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#c9a84c;--gold2:#e8cc7a;--gold3:rgba(201,168,76,.18);
  --ink:#080f0a;--ink2:#0f1a10;--ink3:#162012;
  --g1:#2d5a3d;--g2:#4a7c59;--g3:#6da87e;
  --cream:#f5f0e8;--cream2:rgba(245,240,232,.5);
}
html{scroll-behavior:smooth;}
body{
  width:100%;min-height:100vh;
  background:var(--ink);
  font-family:'Zen Kaku Gothic New',sans-serif;
  -webkit-text-size-adjust:100%;
  overflow-x:hidden;
}

/* ── LOADER ── */
#load{
  position:fixed;inset:0;z-index:9000;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s ease,visibility .5s;
}
#load.gone{opacity:0;visibility:hidden;pointer-events:none;}
.lring{
  width:50px;height:50px;
  border:1px solid rgba(201,168,76,.12);border-top-color:var(--gold);
  border-radius:50%;animation:spin .85s linear infinite;margin-bottom:18px;
}
.l-kanji{font-family:'Shippori Mincho',serif;font-size:22px;color:var(--gold);
  letter-spacing:.3em;animation:pulse 1.4s ease-in-out infinite;}
.l-brand{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;
  color:rgba(245,240,232,.35);letter-spacing:.3em;margin-top:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}

/* ── CANVASES ── */
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none;}
#ptc{position:fixed;inset:0;z-index:1;pointer-events:none;}
/*matcha*/
/* ── VIGNETTE ── */
.vig{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 110% 80% at 50% 30%,transparent 5%,rgba(5,10,7,.65) 100%);
}

/* ── ROTATING SEAL ── */
.seal{
  position:fixed;top:16px;right:16px;z-index:20;
  width:50px;height:50px;
  animation:rspin 24s linear infinite;
  opacity:.75;
}
@keyframes rspin{to{transform:rotate(360deg)}}

/* ── SOUND ── */
#snd{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);right:16px;
  z-index:20;width:38px;height:38px;
  background:rgba(30,55,38,.6);border:1px solid rgba(201,168,76,.25);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;touch-action:manipulation;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

/* ── PAGE ── */
#page{
  position:relative;z-index:3;
  min-height:100vh;
  display:flex;flex-direction:column;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
}

/* ── HERO ── */
.hero{
  position:relative;
  padding:60px 24px 32px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
}

/* subtle hero glow disc */
.hero::before{
  content:'';
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(74,124,89,.18) 0%,transparent 70%);
  pointer-events:none;
  border-radius:50%;
}

.hero-eyebrow{
  font-family:'Shippori Mincho',serif;font-size:9px;
  color:var(--gold);letter-spacing:.55em;text-transform:uppercase;
  margin-bottom:14px;
  opacity:0;animation:fadeUp .7s ease forwards .1s;
}

.hero-logo{
  font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(44px,12vw,64px);
  color:var(--cream);letter-spacing:.08em;line-height:.88;
  text-shadow:0 0 50px rgba(74,124,89,.4),0 2px 30px rgba(0,0,0,.4);
  opacity:0;animation:fadeUp .8s ease forwards .2s;
}
.hero-logo em{
  font-style:italic;color:var(--gold2);
  display:block;font-size:.62em;letter-spacing:.22em;margin-top:2px;
}

.hero-ornament{
  display:flex;align-items:center;gap:10px;
  margin:18px 0 12px;width:180px;
  opacity:0;animation:fadeUp .7s ease forwards .35s;
}
.hero-ornament span{flex:1;height:.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.hero-ornament i{
  width:5px;height:5px;background:var(--gold);
  transform:rotate(45deg);flex-shrink:0;
}

.hero-sub{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(13px,3.8vw,16px);
  color:rgba(245,240,232,.42);letter-spacing:.25em;
  opacity:0;animation:fadeUp .7s ease forwards .45s;
}
.hero-tag{
  font-size:8.5px;color:rgba(245,240,232,.25);letter-spacing:.24em;
  text-transform:uppercase;margin-top:6px;
  opacity:0;animation:fadeUp .7s ease forwards .55s;
}

/* ── MENU HEADING ── */
.section-head{
  display:flex;align-items:center;gap:0;
  margin:16px 18px 14px;
  opacity:0;animation:fadeUp .7s ease forwards .6s;
}
.section-head::before,.section-head::after{
  content:'';flex:1;height:.4px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent);
}
.section-head-text{
  font-family:'Shippori Mincho',serif;font-size:9px;
  color:var(--gold);letter-spacing:.48em;text-transform:uppercase;
  padding:0 14px;white-space:nowrap;
}

/* ── FEATURED CARD (top, full width) ── */
.featured-card{
  margin:0 14px 12px;
  border-radius:18px;overflow:hidden;
  position:relative;
  border:1px solid rgba(201,168,76,.22);
  box-shadow:0 16px 50px rgba(0,0,0,.55),0 0 0 .5px rgba(201,168,76,.1);
  cursor:pointer;
  -webkit-transform:translateZ(0);transform:translateZ(0);
  opacity:0;animation:fadeUp .75s ease forwards .65s;
  transition:transform .25s ease,box-shadow .25s ease;
}
.featured-card:active{transform:scale(.985);}

.featured-card .f-img{
  width:100%;aspect-ratio:4/3;
  object-fit:cover;object-position:center 35%;display:block;
}
.featured-card .f-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(5,12,7,.95) 0%,rgba(5,12,7,.5) 38%,rgba(5,12,7,.08) 65%,transparent 100%);
}
.featured-card .f-shine{
  position:absolute;inset:0;
  background:linear-gradient(125deg,rgba(255,255,255,.06) 0%,transparent 45%);
  pointer-events:none;
}
.f-top-row{
  position:absolute;top:12px;left:12px;right:12px;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.f-badge{
  font-family:'Shippori Mincho',serif;font-size:7.5px;
  color:var(--gold);letter-spacing:.35em;text-transform:uppercase;
  border:1px solid rgba(201,168,76,.4);padding:3px 9px;
  background:rgba(5,12,7,.55);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);border-radius:1px;
}
.f-corner{width:13px;height:13px;}
.f-corner svg{width:100%;height:100%;}

.f-bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:14px 16px 16px;
}
.f-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(20px,5.5vw,26px);color:var(--cream);
  letter-spacing:.06em;line-height:1.1;margin-bottom:4px;
}
.f-desc{
  font-size:8.5px;color:rgba(245,240,232,.4);
  letter-spacing:.18em;text-transform:uppercase;
}
.f-cta{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;
  font-size:9px;color:var(--gold2);letter-spacing:.28em;text-transform:uppercase;
  font-family:'Zen Kaku Gothic New',sans-serif;
}
.f-cta-arrow{font-size:12px;transition:transform .3s;}

/* pbar */
.pbar{position:absolute;bottom:0;left:0;height:2px;background:var(--gold);border-radius:0;}

/* ── 2-COLUMN GRID ── */
.grid2{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:0 14px;
  opacity:0;animation:fadeUp .75s ease forwards .8s;
}

.grid-card{
  position:relative;border-radius:14px;overflow:hidden;
  border:1px solid rgba(201,168,76,.18);
  box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
  cursor:pointer;
  -webkit-transform:translateZ(0);transform:translateZ(0);
  background:var(--ink2);
  transition:transform .22s ease;
}
.grid-card:active{transform:scale(.96);}

.grid-card .g-img{
  width:100%;aspect-ratio:3/4;
  object-fit:cover;object-position:center 25%;display:block;
}
.grid-card .g-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(5,12,7,.95) 0%,rgba(5,12,7,.45) 40%,transparent 70%);
}
.g-badge{
  position:absolute;top:9px;right:9px;
  font-family:'Shippori Mincho',serif;font-size:6.5px;
  color:var(--gold);letter-spacing:.3em;text-transform:uppercase;
  border:1px solid rgba(201,168,76,.35);padding:2px 7px;
  background:rgba(5,12,7,.6);backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);border-radius:1px;
}
.g-corner{position:absolute;top:8px;left:8px;width:11px;height:11px;}
.g-corner svg{width:100%;height:100%;}
.g-bottom{position:absolute;bottom:0;left:0;right:0;padding:10px 11px 12px;}
.g-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(13px,3.6vw,16px);color:var(--cream);
  letter-spacing:.05em;line-height:1.15;margin-bottom:3px;
}
.g-note{font-size:7.5px;color:rgba(245,240,232,.32);letter-spacing:.16em;text-transform:uppercase;}

/* gold dot glow accent on grid cards */
.g-dot{
  position:absolute;bottom:0;right:0;
  width:40px;height:40px;
  background:radial-gradient(circle,rgba(201,168,76,.18),transparent 70%);
  pointer-events:none;
}

/* ── FOOTER ── */
.footer{
  margin-top:28px;
  padding:18px 20px calc(env(safe-area-inset-bottom,0px) + 16px);
  text-align:center;
  border-top:.5px solid rgba(201,168,76,.1);
  opacity:0;animation:fadeUp .7s ease forwards 1s;
}
.footer-brand{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:16px;color:rgba(245,240,232,.2);letter-spacing:.18em;margin-bottom:5px;
}
.footer-line{
  width:40px;height:.4px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent);
  margin:8px auto;
}
.footer-tag{
  font-family:'Shippori Mincho',serif;font-size:8px;
  color:rgba(201,168,76,.28);letter-spacing:.3em;text-transform:uppercase;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ── LIGHTBOX ── */
#lbox{
  position:fixed;inset:0;z-index:8000;
  background:rgba(5,10,7,.94);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;
  transition:opacity .32s,visibility .32s;
  padding:24px 20px;
}
#lbox.show{opacity:1;visibility:visible;}
.lbox-inner{
  width:100%;max-width:340px;
  display:flex;flex-direction:column;align-items:center;
  transform:scale(.94) translateY(12px);
  transition:transform .38s cubic-bezier(.34,1.46,.64,1);
}
#lbox.show .lbox-inner{transform:scale(1) translateY(0);}

.lbox-img-wrap{
  width:100%;border-radius:16px;overflow:hidden;
  border:1px solid rgba(201,168,76,.28);
  box-shadow:0 24px 70px rgba(0,0,0,.7);
  position:relative;
}
.lbox-img-wrap img{
  width:100%;max-height:48vh;
  object-fit:cover;object-position:center;display:block;
}
.lbox-img-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(5,10,7,.6) 0%,transparent 50%);
  pointer-events:none;border-radius:16px;
}
.lbox-badge{
  font-size:7.5px;color:var(--gold);letter-spacing:.42em;
  text-transform:uppercase;border:1px solid rgba(201,168,76,.32);
  padding:3px 11px;margin:16px 0 8px;display:inline-block;
  font-family:'Shippori Mincho',serif;
}
.lbox-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(22px,5.5vw,28px);color:var(--cream);
  letter-spacing:.07em;margin-bottom:6px;text-align:center;
}
.lbox-desc{
  font-size:9px;color:rgba(245,240,232,.38);
  letter-spacing:.2em;text-transform:uppercase;
  line-height:1.75;text-align:center;
}
.lbox-divider{
  width:40px;height:.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px auto;
}
.lbox-close{
  padding:11px 30px;background:transparent;
  border:1px solid rgba(201,168,76,.4);color:var(--gold2);
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:9.5px;
  letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;touch-action:manipulation;border-radius:1px;
  transition:background .28s,color .28s;
}
.lbox-close:active{background:var(--gold);color:var(--ink);}
</style>
</head>
<body>

<!-- LOADER -->
<div id="load">
  <div class="lring"></div>
  <div class="l-kanji">抹茶</div>
  <div class="l-brand">Matcha Project</div>
</div>

<!-- BG -->
<canvas id="bgc"></canvas>
<canvas id="ptc"></canvas>
<div class="vig"></div>

<!-- Seal -->
<svg class="seal" viewBox="0 0 100 100" fill="none">
  <defs><path id="cp" d="M50,50 m-34,0 a34,34 0 1,1 68,0 a34,34 0 1,1 -68,0"/></defs>
  <text font-family="'Zen Kaku Gothic New'" font-size="8" fill="#c9a84c" letter-spacing="2.6">
    <textPath href="#cp">MATCHA PROJECT · マッチャ · MATCHA PROJECT ·</textPath>
  </text>
  <circle cx="50" cy="50" r="21" stroke="#c9a84c" stroke-width=".5" fill="none"/>
  <text x="50" y="47" text-anchor="middle" font-family="'Shippori Mincho'" font-size="10" fill="#c9a84c">茶</text>
  <text x="50" y="57" text-anchor="middle" font-family="'Zen Kaku Gothic New'" font-size="5" fill="rgba(201,168,76,.45)" letter-spacing="1.5">PM</text>
</svg>

<button id="snd">🔇</button>

<!-- LIGHTBOX -->
<div id="lbox">
  <div class="lbox-inner">
    <div class="lbox-img-wrap"><img id="lbox-img" src="" alt=""></div>
    <div class="lbox-badge" id="lbox-badge"></div>
    <div class="lbox-name" id="lbox-name"></div>
    <div class="lbox-desc" id="lbox-desc"></div>
    <div class="lbox-divider"></div>
    <button class="lbox-close" id="lbox-close">Close</button>
  </div>
</div>

<!-- PAGE -->
<div id="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-eyebrow">Art of Matcha</div>
    <div class="hero-logo">MATCHA<em>Project</em></div>
    <div class="hero-ornament"><span></span><i></i><span></span></div>
    <div class="hero-sub">Japanese • Pure • Crafted</div>
    <div class="hero-tag">Freshly whisked · Ceremonial grade · Made to order</div>
  </div>

  <!-- SECTION HEADING -->
  <div class="section-head">
    <div class="section-head-text">Our Menu</div>
  </div>

  <!-- FEATURED -->
  <div class="featured-card" id="featCard">
    <img class="f-img" id="featImg" src="" alt="" decoding="async">
    <div class="f-overlay"></div>
    <div class="f-shine"></div>
    <div class="f-top-row">
      <div class="f-badge" id="featBadge"></div>
      <div class="f-corner">
        <svg viewBox="0 0 14 14" fill="none" stroke="#c9a84c" stroke-width=".7"><path d="M1 13V1H13"/></svg>
      </div>
    </div>
    <div class="f-bottom">
      <div class="f-name" id="featName"></div>
      <div class="f-desc" id="featDesc"></div>
      <div class="f-cta">Tap to view <span class="f-cta-arrow">→</span></div>
    </div>
    <div class="pbar" id="fpbar"></div>
  </div>

  <!-- 2-COL GRID -->
  <div class="grid2" id="grid2" style="margin-top:10px;"></div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-brand">Matcha Project</div>
    <div class="footer-line"></div>
    <div class="footer-tag">Designed by Harshit Dasari</div>
  </div>

</div>

const drinks = [
  { name:"Coconut Matcha Cloud",  badge:"SIGNATURE", note:"Dairy-free · Tropical",  desc:"Creamy coconut · Ceremonial matcha · Cloud foam",     extras:"coconut"    },
  { name:"Mango Matcha Latte",    badge:"TROPICAL",  note:"Fruity · Refreshing",    desc:"Sun-kissed mango · Matcha swirl · Iced latte",        extras:"mango"      },
  { name:"Vanilla Float Matcha",  badge:"CLASSIC",   note:"Smooth · Indulgent",     desc:"Madagascar vanilla · Ice cream float · Matcha base",  extras:"vanilla"    },
  { name:"Strawberry Cold Foam",  badge:"SEASONAL",  note:"Sweet · Vibrant",        desc:"Wild strawberry · Cold foam · Iced matcha",           extras:"strawberry" },
  { name:"Biscoff Matcha Cream",  badge:"INDULGENT", note:"Spiced · Rich",          desc:"Lotus Biscoff · Matcha espresso · Velvet cream",      extras:"biscoff"    },
];

// ── FEATURED (auto-rotating) ──
let featIdx = 0, featTimer = null;
const FEAT_INTERVAL = 4000;

function setFeatured(idx, animate) {
  const d = drinks[idx];
  const img  = document.getElementById('featImg');
  const name = document.getElementById('featName');
  const desc = document.getElementById('featDesc');
  const badge= document.getElementById('featBadge');

  if (animate) {
    [img, name, desc].forEach(el => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; });
    setTimeout(() => {
      img.src    = drinkImages[d.extras];
      name.textContent  = d.name;
      desc.textContent  = d.desc;
      badge.textContent = d.badge;
      [img, name, desc].forEach(el => { el.style.opacity = '1'; });
    }, 280);
  } else {
    img.src   = drinkImages[d.extras];
    name.textContent  = d.name;
    desc.textContent  = d.desc;
    badge.textContent = d.badge;
  }
  animPbar();
}

function animPbar() {
  const pb = document.getElementById('fpbar');
  pb.style.transition = 'none'; pb.style.width = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pb.style.transition = `width ${FEAT_INTERVAL}ms linear`;
    pb.style.width = '100%';
  }));
}

function resetFeatTimer() {
  clearInterval(featTimer);
  featTimer = setInterval(() => {
    featIdx = (featIdx + 1) % drinks.length;
    setFeatured(featIdx, true);
  }, FEAT_INTERVAL);
}

// Featured click → open lightbox
document.getElementById('featCard').addEventListener('click', () => {
  openLightbox(drinks[featIdx]);
});

setFeatured(0, false);
resetFeatTimer();

// ── GRID (remaining 4 drinks) ──
const grid = document.getElementById('grid2');
drinks.slice(1).forEach((d) => {
  const el = document.createElement('div');
  el.className = 'grid-card';
  el.innerHTML = `
    <img class="g-img" src="${drinkImages[d.extras]}" alt="${d.name}" decoding="async" loading="lazy">
    <div class="g-overlay"></div>
    <div class="g-badge">${d.badge}</div>
    <div class="g-corner">
      <svg viewBox="0 0 12 12" fill="none" stroke="#c9a84c" stroke-width=".65"><path d="M1 11V1H11"/></svg>
    </div>
    <div class="g-bottom">
      <div class="g-name">${d.name}</div>
      <div class="g-note">${d.note}</div>
    </div>
    <div class="g-dot"></div>
  `;
  el.addEventListener('click', () => openLightbox(d));
  grid.appendChild(el);
});

// ── LIGHTBOX ──
function openLightbox(d) {
  document.getElementById('lbox-img').src   = drinkImages[d.extras];
  document.getElementById('lbox-badge').textContent = d.badge;
  document.getElementById('lbox-name').textContent  = d.name;
  document.getElementById('lbox-desc').textContent  = d.desc;
  document.getElementById('lbox').classList.add('show');
}
document.getElementById('lbox-close').addEventListener('click', () =>
  document.getElementById('lbox').classList.remove('show'));
document.getElementById('lbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lbox'))
    document.getElementById('lbox').classList.remove('show');
});

// ── LOADER ──
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => document.getElementById('load').classList.add('gone'), 650);
});

// ── BG CANVAS ──
(function(){
  const c=document.getElementById('bgc'),ctx=c.getContext('2d');
  let W,H,t=0;
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;}sz();
  addEventListener('resize',sz);
  const orbs=[
    {x:.15,y:.15,r:.55,col:'40,82,54',sp:.0005},
    {x:.82,y:.55,r:.48,col:'68,115,82',sp:.0004},
    {x:.4,y:.9,r:.4,col:'25,48,34',sp:.0007},
  ];
  function draw(){
    ctx.fillStyle='#080f0a';ctx.fillRect(0,0,W,H);
    orbs.forEach((o,i)=>{
      const x=W*(o.x+.06*Math.sin(t*o.sp*1000+i));
      const y=H*(o.y+.05*Math.cos(t*o.sp*1000+i*2));
      const r=Math.min(W,H)*o.r;
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,`rgba(${o.col},.11)`);g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
    });
    t++;requestAnimationFrame(draw);
  }
  draw();
})();

// ── PARTICLES ──
(function(){
  const c=document.getElementById('ptc'),ctx=c.getContext('2d');
  let W,H;
  function sz(){W=c.width=innerWidth;H=c.height=innerHeight;}sz();
  addEventListener('resize',sz);
  const pts=Array.from({length:22},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    r:Math.random()*1.2+.28,dx:(Math.random()-.5)*.14,dy:-Math.random()*.28-.04,
    a:Math.random(),da:(Math.random()-.5)*.005,
    type:Math.floor(Math.random()*3),
    rot:Math.random()*Math.PI*2,drot:(Math.random()-.5)*.009,
  }));
  function loop(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.dx;p.y+=p.dy;p.a+=p.da;p.rot+=p.drot;
      if(p.a<0||p.a>1)p.da*=-1;
      if(p.y<-20){p.y=H+20;p.x=Math.random()*W;}
      if(p.type===1){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.a*.28;
        ctx.beginPath();ctx.moveTo(0,-p.r*3);ctx.bezierCurveTo(p.r*1.5,-p.r*1.5,p.r*1.5,p.r*1.5,0,p.r*3);
        ctx.bezierCurveTo(-p.r*1.5,p.r*1.5,-p.r*1.5,-p.r*1.5,0,-p.r*3);
        ctx.fillStyle='hsl(132,36%,34%)';ctx.fill();ctx.restore();
      } else if(p.type===2){
        ctx.globalAlpha=p.a*.16;ctx.fillStyle='#c9a84c';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*.42,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      } else {
        ctx.globalAlpha=p.a*.09;
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);
        g.addColorStop(0,'rgba(90,148,105,.6)');g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      }
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

// ── SOUND ──
let actx=null,playing=false,oscs=[],gainN=null;
function startAudio(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  gainN=actx.createGain();gainN.gain.setValueAtTime(0,actx.currentTime);
  gainN.gain.linearRampToValueAtTime(.032,actx.currentTime+2);gainN.connect(actx.destination);
  [55,110,165,220].forEach((f,i)=>{
    const o=actx.createOscillator();o.frequency.value=f;
    const g=actx.createGain();g.gain.value=i===0?.48:.09-i*.014;
    o.connect(g);g.connect(gainN);o.start();oscs.push(o);
  });
  playing=true;document.getElementById('snd').textContent='🔊';
}
function stopAudio(){
  if(!gainN)return;
  gainN.gain.linearRampToValueAtTime(0,actx.currentTime+1);
  setTimeout(()=>{oscs.forEach(o=>{try{o.stop();}catch(e){}});oscs=[];actx.close();actx=null;},1100);
  playing=false;document.getElementById('snd').textContent='🔇';
}
document.getElementById('snd').addEventListener('click',()=>playing?stopAudio():startAudio());
</script>
